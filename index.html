<!DOCTYPE html>
<html>
<head>
  <title>Pengumuman Kelulusan</title>
</head>
<body>
  <h2>CEK KELULUSAN 2026</h2>

  <input type="text" id="nisn" placeholder="Masukkan NISN"><br><br>
  <input type="password" id="password" placeholder="Masukkan Password"><br><br>

  <button onclick="cek()">Cek</button>

  <div id="hasil"></div>

  <script src="data.js"></script>
  <script>
    function cek() {
      let nisn = document.getElementById("nisn").value;
      let password = document.getElementById("password").value;

      let user = siswa.find(s => s.nisn === nisn && s.password === password);

      if (user) {
        let html = `
          <h3>${user.nama}</h3>
          <p>Status: <b>${user.status}</b></p>
        `;

        if (user.status === "LULUS") {
          html += `<a href="${user.file}" download>Download SKL</a>`;
        }

        document.getElementById("hasil").innerHTML = html;
      } else {
        document.getElementById("hasil").innerHTML = "Data tidak ditemukan!";
      }
    }
  </script>
</body>
</html>
